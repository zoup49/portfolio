<!DOCTYPE html>
<html lang="fr">
<head>
  <title>Portrait — Adrian Gelineau</title>
  <meta charset="utf-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Esteban&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">

    <!-- Barre mobile : nom + bouton hamburger -->
    <div class="sidebar-mobile-header">
      <a href="index.html" class="sidebar-mobile-nom">
        <span class="nom">ADRIAN GELINEAU</span>
        <span class="sous-nom">photographie argentique</span>
      </a>
      <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>

    <!-- Contenu sidebar (toujours visible sur ordi, overlay sur mobile) -->
    <div class="sidebar-inner">
      <div class="sidebar-nom">
        <a href="index.html">
          <span class="nom">ADRIAN GELINEAU</span>
          <span class="sous-nom">photographie argentique</span>
        </a>
      </div>
      <nav class="sidebar-nav">
      <a href="paysage.html">paysage</a>
      <a href="musique.html">musique & art</a>
      <a href="double-exposition.html">doubles expositions</a>
      <a href="portrait.html" class="active">portrait</a>
        <span class="nav-separateur"></span>
      <a href="apropos.html">à propos</a>
      </nav>
      <a href="https://www.instagram.com/adrian_alog/" target="_blank" rel="noopener noreferrer" class="instagram-sidebar" aria-label="Instagram">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/></svg>
      </a>
    </div>

  </aside>

  <main class="contenu">
    <p class="page-titre">Portrait</p>

    <section class="serie">
      <div class="serie-info">
        <h2 class="serie-titre">Nom du projet ou de la personne</h2>
        <p class="serie-credits">Description — pellicule, lieu, date</p>
      </div>
      <!-- Photos générées par le JS ci-dessous — ne pas modifier -->
      <div class="galerie-bande" id="serie-portrait1"></div>
    </section>

  </main>

  <script>
    const BASE = "https://res.cloudinary.com/djrtz9zbk/image/upload";

    // =============================================
    // PHOTOS — modifie uniquement ces listes
    // format : ["version/nom_fichier", "description"]
    // =============================================
    const SERIES = {
      "serie-portrait1": [
        ["v1779740503/concert_4_qgwijq",                  "Portrait"],
        ["v1779740346/concert_3_md6yuu",                  "Portrait"],
        ["v1779740346/concert_1_qyfpxs",                  "Portrait"],
        ["v1779740346/concert_2_n4treq",                  "Portrait"],
        // ajouter : ["version/nom_fichier", "description"],
      ],

    };

    // Génération automatique — ne pas modifier
    Object.entries(SERIES).forEach(([id, photos]) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = photos.map(([file, alt]) =>
        `<a href="${BASE}/w_1600,q_auto/${file}.jpg" class="glightbox">` +
        `<img src="${BASE}/w_800,q_auto/${file}.jpg" alt="${alt}" loading="lazy"/></a>`
      ).join("");
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
  <script>
    const lightbox = GLightbox();
    document.querySelectorAll(".galerie-bande").forEach(bande => {
      bande.addEventListener("wheel", function(e) {
        const auBout =
          (e.deltaY > 0 && bande.scrollLeft >= bande.scrollWidth - bande.clientWidth - 1) ||
          (e.deltaY < 0 && bande.scrollLeft <= 0);
        if (auBout) return;
        e.preventDefault();
        bande.scrollLeft += e.deltaY * 1.5;
      }, { passive: false });
    });
  </script>

  <script>
    const btn = document.getElementById("hamburger");
    const sb  = document.querySelector(".sidebar");
    if (btn) {
      btn.addEventListener("click", () => {
        const open = sb.classList.toggle("menu-open");
        btn.setAttribute("aria-expanded", open);
      });
      sb.querySelectorAll(".sidebar-nav a").forEach(a =>
        a.addEventListener("click", () => sb.classList.remove("menu-open"))
      );
    }
  </script>

</body>
</html>
